---
services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://10.10.10.253:11434
    volumes:
      - open-webui:/app/backend/data
    restart: always

volumes:
  open-webui:

    
