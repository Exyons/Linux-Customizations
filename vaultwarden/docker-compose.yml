---
services:
  waf:
    image: owasp/modsecurity-crs:apache
    container_name: waf
    user: 0:0 # Run it as root
    environment:
      PARANOIA: 1
      ANOMALY_INBOUND: 10
      ANOMALY_OUTBOUND: 5
      # PROXY: 1
      REMOTEIP_INT_PROXY: "192.168.112.0/20" # traefik network subnet
      BACKEND: "http://vaultwarden:80"
      BACKEND_WS: "ws://vaultwarden:80/notifications/hub"
      ERRORLOG: "/var/log/waf/waf.log"
      PROXY_ERROR_OVERRIDE: "off"
      PORT: 80 # An int value indicating the port where the webserver is listening to
    networks:
      - traefik
    volumes:
      - ./waf:/var/log/waf
      - ./waf-rules/:/etc/modsecurity.d/owasp-crs/rules/
    labels:
      - traefik.enable=true
      - traefik.http.routers.vw-ui-https.rule=Host(`vaultwarden.machoboiverse.cloud`)
      - traefik.http.routers.vw-ui-https.entrypoints=websecure
      - traefik.http.routers.vw-ui-https.tls=true
      - traefik.http.routers.vw-ui-https.service=vw-ui
      - traefik.http.routers.vw-ui-https.tls.certresolver=production
      - traefik.http.services.vw-ui.loadbalancer.server.port=80

      - traefik.http.routers.vw-websocket-https.rule=Host(`vaultwarden.machoboiverse.cloud`) && Path(`/notifications/hub`)
      - traefik.http.routers.vw-websocket-https.entrypoints=websecure
      - traefik.http.routers.vw-websocket-https.tls=true
      - traefik.http.routers.vw-websocket-https.service=vw-websocket
      - traefik.http.services.vw-websocket.loadbalancer.server.port=3012
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      labels:
      - traefik.enable=true
      - traefik.http.routers.vw-ui-https.rule=Host(`vaultwarden.machoboiverse.cloud`)
      - traefik.http.routers.vw-ui-https.entrypoints=websecure
      - traefik.http.routers.vw-ui-https.tls=true
      - traefik.http.routers.vw-ui-https.service=vw-ui
      - traefik.http.routers.vw-ui-https.tls.certresolver=production
      - traefik.http.services.vw-ui.loadbalancer.server.port=80

      - traefik.http.routers.vw-websocket-https.rule=Host(`vaultwarden.machoboiverse.cloud`) && Path(`/notifications/hub`)
      - traefik.http.routers.vw-websocket-https.entrypoints=websecure
      - traefik.http.routers.vw-websocket-https.tls=true
      - traefik.http.routers.vw-websocket-https.service=vw-websocket
      - traefik.http.services.vw-websocket.loadbalancer.server.port=3012

  vaultwarden:
    image: vaultwarden/server:1.30.5-alpine
    container_name: vaultwarden
    environment:
      WEBSOCKET_ENABLED: "true"
      SENDS_ALLOWED: "true"
      PASSWORD_ITERATIONS: 500000
      SIGNUPS_ALLOWED: "false"
      SIGNUPS_VERIFY: "true"
      SIGNUPS_DOMAINS_WHITELIST: "machoboiverse.cloud"
      # ADMIN_TOKEN: "some random string" #generate with openssl rand
      # DOMAIN: "https://vaultwarden.machoboiverse.cloud"
      # SMTP_HOST: "smtp server"
      # SMTP_FROM: "sender email e.g: you@domain.tld"
      # SMTP_FROM_NAME: "sender name"
      # SMTP_SECURITY: "starttls"
      # SMTP_PORT: 587
      # SMTP_USERNAME: "smtp username"
      # SMTP_PASSWORD: "smtp password"
      # SMTP_TIMEOUT: 15
      LOG_FILE: "/data/vaultwarden.log"
      LOG_LEVEL: "warn"
      EXTENDED_LOGGING: "true"
      TZ: "Asia/Kolkata"
    networks:
      - traefik
    volumes:
      - vaultwarden-data:/data
    restart: always
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

volumes:
  vaultwarden-data:

networks:
  traefik:
    external: true
