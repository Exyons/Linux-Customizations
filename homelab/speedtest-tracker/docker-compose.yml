---
services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:0.19.0
    container_name: speedtest-tracker
    restart: always
    ports:
      - "8090:443"
    env_file: .env
    volumes:
      - ./config:/config
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
