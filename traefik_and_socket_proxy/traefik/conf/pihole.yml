http:
  routers:
    pihole:
      rule: "Host(`pihole.machoboiverse.cloud`)"
      service: pihole-service
      entryPoints:
        - websecure
      tls:
        certResolver: production

  services:
    pihole-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.10.10.5"
        healthCheck:
          path: /
          interval: "10s"
          timeout: "3s"